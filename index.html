<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ═══════════════════════════════════════════════
     VIEWPORT — no zoom, full safe-area on notched phones
═══════════════════════════════════════════════ -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Dodge Dash Legends</title>

<!-- ═══════════════════════════════════════════════
     CONTENT SECURITY POLICY
     – allows Three.js from cdnjs, blocks inline eval
       except for the game's own scripts (same-origin)
═══════════════════════════════════════════════ -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src  'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
  style-src   'self' 'unsafe-inline';
  img-src     'self' data: blob:;
  font-src    'self' data:;
  connect-src 'self' https:;
  worker-src  'self' blob:;
  manifest-src 'self';
  frame-ancestors 'none';
  base-uri    'self';
  form-action 'self';
">

<!-- ═══════════════════════════════════════════════
     SECURITY HEADERS (via meta — supplement server headers)
═══════════════════════════════════════════════ -->
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Permissions-Policy" content="
  camera=(),
  microphone=(),
  geolocation=(),
  payment=(),
  usb=(),
  interest-cohort=()
">

<!-- ═══════════════════════════════════════════════
     THEME & BRAND
═══════════════════════════════════════════════ -->
<meta name="theme-color" content="#7c4dff">
<meta name="color-scheme" content="dark">
<meta name="application-name" content="Dodge Dash Legends">
<meta name="description" content="3D Arcade Racing — dodge traffic, collect power-ups, race to the finish!">
<meta name="keywords" content="racing game, arcade, 3D, dodge, cars">
<meta name="author" content="Dodge Dash Legends">
<meta name="robots" content="index, follow">

<!-- ═══════════════════════════════════════════════
     OPEN GRAPH (social sharing)
═══════════════════════════════════════════════ -->
<meta property="og:type"        content="website">
<meta property="og:title"       content="Dodge Dash Legends">
<meta property="og:description" content="3D Arcade Racing — dodge traffic, collect power-ups, race to the finish!">
<meta property="og:image"       content="./icons/icon-512.png">
<meta property="og:image:width" content="512">
<meta property="og:image:height"content="512">
<meta property="og:locale"      content="en_US">

<!-- Twitter card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="Dodge Dash Legends">
<meta name="twitter:description" content="3D Arcade Racing — dodge traffic, collect power-ups, race to the finish!">
<meta name="twitter:image"       content="./icons/icon-512.png">

<!-- ═══════════════════════════════════════════════
     FAVICONS
═══════════════════════════════════════════════ -->
<link rel="icon"          type="image/png" sizes="32x32" href="./icons/icon-48.png">
<link rel="icon"          type="image/png" sizes="96x96" href="./icons/icon-96.png">
<link rel="shortcut icon" href="./icons/icon-192.png">

<!-- ═══════════════════════════════════════════════
     PRELOADS — get the game file and Three.js moving early
═══════════════════════════════════════════════ -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<style>
/* ── Reset ──────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

/* ── Body — full-screen PWA, notch-safe ─────────── */
html,body{
  width:100%;height:100%;
  background:#0a0a0f;
  color:#fff;
  font-family:'Segoe UI',Arial,sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  -webkit-touch-callout:none;
  /* Prevent iOS overscroll bounce that breaks full-screen games */
  overscroll-behavior:none;
  /* Prevent text size changes on orientation switch */
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  /* GPU-composite the root so the canvas layer is isolated */
  transform:translateZ(0);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ── Canvas — true full-screen, respects safe areas ─ */
canvas{display:block;}
#game-canvas{
  position:fixed;
  /* env() safe-area insets for notched devices */
  top:env(safe-area-inset-top, 0px);
  left:env(safe-area-inset-left, 0px);
  right:env(safe-area-inset-right, 0px);
  bottom:env(safe-area-inset-bottom, 0px);
  width:100vw;
  height:100vh;
  /* Hint to browser: promote to own compositor layer */
  will-change:transform;
  /* Disable default touch actions so game controls work */
  touch-action:none;
}

/* ── HUD safe-area padding ───────────────────────── */
#hud,#mobile-controls,[id^="screen-"]{
  /* Push content inside safe zones for notched/pill phones */
  padding-top:    env(safe-area-inset-top,    0px);
  padding-right:  env(safe-area-inset-right,  0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  padding-left:   env(safe-area-inset-left,   0px);
}

/* ── Focus ring for accessibility ───────────────── */
:focus-visible{outline:2px solid #7c4dff;outline-offset:2px;}
</style>
</head>
<body>

<canvas id="game-canvas" aria-label="Dodge Dash Legends game canvas" role="img"></canvas>

<!-- HUD Overlay -->
<div id="hud" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;">
  <!-- Top bar -->
  <div style="position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:28px;align-items:center;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);border-radius:40px;padding:8px 28px;backdrop-filter:blur(8px);">
    <div style="text-align:center;">
      <div style="font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;">LAP</div>
      <div id="hud-lap" style="font-size:22px;font-weight:900;color:#fff;">1/4</div>
    </div>
    <div style="width:1px;height:32px;background:rgba(255,255,255,0.18);"></div>
    <div style="text-align:center;">
      <div style="font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;">TIME</div>
      <div id="hud-time" style="font-size:22px;font-weight:900;color:#FFD700;">0:00</div>
    </div>
    <div style="width:1px;height:32px;background:rgba(255,255,255,0.18);"></div>
    <div style="text-align:center;">
      <div style="font-size:10px;color:#aaa;letter-spacing:1px;text-transform:uppercase;">POS</div>
      <div id="hud-pos" style="font-size:22px;font-weight:900;color:#00e5ff;">1st</div>
    </div>
  </div>
  <!-- Speedometer -->
  <div style="position:absolute;bottom:22px;right:22px;text-align:center;">
    <div id="hud-speed" style="font-size:42px;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(0,229,255,0.8);">0</div>
    <div style="font-size:11px;color:#aaa;letter-spacing:2px;">KM/H</div>
  </div>
  <!-- Health bar -->
  <div style="position:absolute;bottom:22px;left:22px;">
    <div style="font-size:11px;color:#aaa;letter-spacing:1px;margin-bottom:5px;">HEALTH</div>
    <div style="width:140px;height:10px;background:rgba(255,255,255,0.15);border-radius:5px;overflow:hidden;">
      <div id="hud-health" style="height:100%;width:100%;background:linear-gradient(90deg,#00e676,#69f0ae);border-radius:5px;transition:width 0.3s,background 0.3s;"></div>
    </div>
  </div>
  <!-- Coins -->
  <div style="position:absolute;top:14px;left:22px;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,215,0,0.3);border-radius:30px;padding:6px 16px;">
    <span style="font-size:18px;">🪙</span>
    <span id="hud-coins" style="font-size:18px;font-weight:800;color:#FFD700;">0</span>
  </div>
  <!-- Power-up slot -->
  <div id="hud-powerup" style="position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:none;text-align:center;">
    <div style="background:rgba(0,0,0,0.7);border:2px solid rgba(255,255,255,0.25);border-radius:12px;padding:10px 20px;">
      <div id="hud-powerup-icon" style="font-size:32px;">⚡</div>
      <div id="hud-powerup-name" style="font-size:11px;color:#fff;letter-spacing:1px;margin-top:3px;">NITRO</div>
    </div>
  </div>
  <!-- XP bar -->
  <div style="position:absolute;top:14px;right:22px;text-align:right;">
    <div style="display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);border-radius:30px;padding:6px 16px;">
      <span id="hud-level" style="font-size:13px;font-weight:800;color:#b39ddb;">Lv.1</span>
      <div style="width:80px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden;">
        <div id="hud-xp" style="height:100%;width:0%;background:linear-gradient(90deg,#7c4dff,#e040fb);border-radius:3px;transition:width 0.4s;"></div>
      </div>
    </div>
  </div>
  <!-- Camera mode -->
  <div id="hud-cam" style="position:absolute;top:80px;right:22px;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 14px;font-size:11px;color:#aaa;letter-spacing:1px;">CAM: CHASE</div>
  <!-- Mini-map -->
  <canvas id="minimap" width="140" height="140" style="position:absolute;bottom:110px;right:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.22);background:rgba(0,0,0,0.55);opacity:0.88;"></canvas>
  <!-- Active effects bar -->
  <div id="hud-effects" style="position:absolute;top:80px;left:22px;display:flex;flex-direction:column;gap:5px;"></div>
  <!-- Boost indicator -->
  <div id="hud-boost" style="position:absolute;bottom:85px;right:22px;display:none;font-size:13px;font-weight:800;color:#ff6d00;text-shadow:0 0 12px rgba(255,109,0,0.9);letter-spacing:2px;animation:boostPulse 0.4s infinite alternate;">BOOST!</div>
</div>

<!-- Mobile Controls -->
<div id="mobile-controls" style="display:none;position:fixed;bottom:0;left:0;width:100%;height:200px;pointer-events:none;z-index:20;">

  <!-- LEFT SIDE: Steer Left / Right buttons + Camera -->
  <div style="position:absolute;left:14px;bottom:18px;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:all;">
    <!-- Camera button above steer pair -->
    <button id="btn-cam" style="width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,0.65);border:2px solid rgba(255,255,255,0.22);color:#fff;font-size:20px;cursor:pointer;touch-action:manipulation;">📷</button>
    <div style="display:flex;gap:10px;">
      <!-- Steer Left -->
      <button id="btn-left" style="width:72px;height:72px;border-radius:50%;background:rgba(30,80,200,0.75);border:2px solid rgba(100,160,255,0.55);color:#fff;font-size:30px;font-weight:900;cursor:pointer;touch-action:manipulation;user-select:none;">◀</button>
      <!-- Steer Right -->
      <button id="btn-right" style="width:72px;height:72px;border-radius:50%;background:rgba(30,80,200,0.75);border:2px solid rgba(100,160,255,0.55);color:#fff;font-size:30px;font-weight:900;cursor:pointer;touch-action:manipulation;user-select:none;">▶</button>
    </div>
  </div>

  <!-- RIGHT SIDE: Gas / Brake pedals + Nitro boost -->
  <div style="position:absolute;right:14px;bottom:18px;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:all;">
    <!-- Nitro boost — large, prominent -->
    <button id="btn-boost" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#ff6d00,#ff9100);border:2px solid rgba(255,200,80,0.6);color:#fff;font-size:28px;font-weight:900;cursor:pointer;touch-action:manipulation;box-shadow:0 0 18px rgba(255,109,0,0.5);">⚡</button>
    <div style="display:flex;gap:10px;">
      <!-- Brake pedal -->
      <button id="btn-brake" style="width:72px;height:72px;border-radius:50%;background:rgba(200,30,30,0.75);border:2px solid rgba(255,80,80,0.55);color:#fff;font-size:15px;font-weight:900;cursor:pointer;touch-action:manipulation;letter-spacing:0.5px;">▼<br><span style="font-size:10px;letter-spacing:1px;">BRAKE</span></button>
      <!-- Gas pedal -->
      <button id="btn-gas" style="width:72px;height:72px;border-radius:50%;background:rgba(30,160,60,0.75);border:2px solid rgba(80,220,100,0.55);color:#fff;font-size:15px;font-weight:900;cursor:pointer;touch-action:manipulation;letter-spacing:0.5px;">▲<br><span style="font-size:10px;letter-spacing:1px;">GAS</span></button>
    </div>
  </div>

</div>

<!-- Screens -->
<div id="screen-main" style="position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a0a2e 0%,#0a0a0f 70%);">
  <div style="text-align:center;margin-bottom:40px;">
    <div style="font-size:62px;margin-bottom:8px;">🏎️</div>
    <h1 style="font-size:52px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#00e5ff,#7c4dff,#ff6d00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;">DODGE DASH</h1>
    <h1 style="font-size:52px;font-weight:900;letter-spacing:6px;background:linear-gradient(135deg,#ff6d00,#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">LEGENDS</h1>
    <p style="color:#888;font-size:14px;letter-spacing:3px;margin-top:8px;">3D ARCADE RACING</p>
  </div>
  <div id="main-menu-btns" style="display:flex;flex-direction:column;gap:12px;width:260px;">
    <button onclick="GameState.raceMode='quick';showScreen('screen-mode')" class="menu-btn" style="background:linear-gradient(135deg,#7c4dff,#e040fb);">🏁 QUICK RACE</button>
    <button onclick="startTimeTrialMode()" class="menu-btn" style="background:linear-gradient(135deg,#ff6d00,#ff9100);">⏱ TIME TRIAL</button>
    <button onclick="showScreen('screen-garage')" class="menu-btn" style="background:linear-gradient(135deg,#00897b,#00e676);">🚗 GARAGE</button>
    <button onclick="showScreen('screen-stats')" class="menu-btn" style="background:linear-gradient(135deg,#1565c0,#00e5ff);">🏆 STATS</button>
  </div>
  <div id="save-badge" style="margin-top:28px;font-size:12px;color:#555;letter-spacing:1px;"></div>
</div>

<!-- Race Mode / Track Select -->
<div id="screen-mode" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0d1f3c 0%,#0a0a0f 70%);">
  <h2 style="font-size:32px;font-weight:900;letter-spacing:3px;color:#00e5ff;margin-bottom:8px;">SELECT TRACK</h2>
  <p style="color:#666;font-size:13px;margin-bottom:28px;">Choose your battlefield</p>
  <div id="track-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:540px;width:90%;margin-bottom:28px;"></div>
  <button onclick="showScreen('screen-main')" class="menu-btn" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);width:200px;">← BACK</button>
</div>

<!-- Garage / Vehicle Select -->
<div id="screen-garage" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#1a2a0a 0%,#0a0a0f 70%);">
  <h2 style="font-size:32px;font-weight:900;letter-spacing:3px;color:#00e676;margin-bottom:8px;">🔧 GARAGE</h2>
  <p style="color:#666;font-size:13px;margin-bottom:28px;">Choose your ride — unlock more as you level up</p>
  <div id="car-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:560px;width:90%;margin-bottom:28px;"></div>
  <button onclick="showScreen('screen-main')" class="menu-btn" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);width:200px;">← BACK</button>
</div>

<!-- Stats Screen -->
<div id="screen-stats" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0a1a2e 0%,#0a0a0f 70%);">
  <h2 style="font-size:32px;font-weight:900;letter-spacing:3px;color:#FFD700;margin-bottom:24px;">🏆 DRIVER STATS</h2>
  <div id="stats-content" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:28px 40px;text-align:center;min-width:280px;margin-bottom:28px;"></div>
  <button onclick="showScreen('screen-main')" class="menu-btn" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);width:200px;">← BACK</button>
</div>

<!-- Results Screen -->
<div id="screen-results" style="position:fixed;inset:0;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.92);">
  <div style="text-align:center;animation:slideUp 0.5s ease-out;">
    <div id="results-trophy" style="font-size:72px;margin-bottom:12px;">🏆</div>
    <h2 id="results-title" style="font-size:36px;font-weight:900;letter-spacing:3px;color:#FFD700;margin-bottom:6px;">RACE COMPLETE!</h2>
    <p id="results-subtitle" style="color:#aaa;font-size:14px;letter-spacing:2px;margin-bottom:28px;"></p>
    <div id="results-grid" style="display:flex;gap:32px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;"></div>
    <div id="results-rewards" style="margin-bottom:28px;"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <button onclick="retryRace()" class="menu-btn" style="background:linear-gradient(135deg,#7c4dff,#e040fb);min-width:150px;">🔄 RETRY</button>
      <button onclick="showScreen('screen-main')" class="menu-btn" style="background:linear-gradient(135deg,#ff6d00,#ff9100);min-width:150px;">🏠 MENU</button>
    </div>
  </div>
</div>

<!-- Countdown overlay -->
<div id="screen-countdown" style="position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;">
  <div id="countdown-num" style="font-size:120px;font-weight:900;color:#fff;text-shadow:0 0 60px rgba(255,255,255,0.8);animation:countPop 0.5s ease-out;"></div>
</div>

<!-- Pause screen -->
<div id="screen-pause" style="position:fixed;inset:0;z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);">
  <h2 style="font-size:40px;font-weight:900;letter-spacing:4px;color:#fff;margin-bottom:32px;">⏸ PAUSED</h2>
  <div style="display:flex;flex-direction:column;gap:12px;width:220px;">
    <button onclick="resumeRace()" class="menu-btn" style="background:linear-gradient(135deg,#00897b,#00e676);">▶ RESUME</button>
    <button onclick="cycleCameraMode()" class="menu-btn" style="background:linear-gradient(135deg,#1565c0,#00e5ff);">📷 CAMERA</button>
    <button onclick="abandonRace()" class="menu-btn" style="background:rgba(244,67,54,0.7);border:1px solid rgba(255,255,255,0.2);">🚩 QUIT RACE</button>
  </div>
  <p style="color:#555;font-size:12px;margin-top:20px;letter-spacing:2px;">PRESS ESC TO RESUME</p>
</div>

<!-- Notification toast -->
<div id="game-toast" style="position:fixed;top:100px;left:50%;transform:translateX(-50%);z-index:200;display:none;background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.2);border-radius:30px;padding:10px 28px;font-size:15px;font-weight:700;color:#fff;pointer-events:none;letter-spacing:1px;"></div>

<style>
.menu-btn{
  width:100%;padding:14px 20px;border:none;border-radius:12px;color:#fff;
  font-size:15px;font-weight:800;letter-spacing:1.5px;cursor:pointer;
  text-transform:uppercase;transition:transform 0.1s,box-shadow 0.1s;
  touch-action:manipulation;
}
.menu-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.5);}
.menu-btn:active{transform:translateY(0);}
.track-card{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:16px;cursor:pointer;text-align:center;
  transition:background 0.2s,border-color 0.2s,transform 0.15s;
}
.track-card:hover{background:rgba(255,255,255,0.12);border-color:rgba(0,229,255,0.5);transform:translateY(-3px);}
.track-card.locked{opacity:0.4;cursor:not-allowed;}
.car-card{
  background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);
  border-radius:12px;padding:12px;cursor:pointer;text-align:center;
  transition:all 0.2s;
}
.car-card:hover:not(.locked){background:rgba(255,255,255,0.12);border-color:rgba(0,229,255,0.5);transform:scale(1.04);}
.car-card.selected{border-color:#00e5ff;background:rgba(0,229,255,0.12);}
.car-card.locked{opacity:0.4;cursor:not-allowed;}
@keyframes boostPulse{from{opacity:1;transform:translateX(-50%) scale(1);}to{opacity:0.6;transform:translateX(-50%) scale(1.08);}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes countPop{0%{transform:scale(1.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes effectFlash{0%,100%{opacity:1;}50%{opacity:0.5;}}
.effect-badge{

const TRACK_DEFS = [

  { id:'neon',     name:'Night Neon City',  emoji:'🌃', unlockLevel:5,  laps:4, timeLimit:175, sky:0x080820, fogColor:0x100820, fogNear:40,  fogFar:220, groundColor:0x202030, bgColor:0x05051a, weather:'night', desc:'Glow-wire racing through neon lights' },
  { id:'volcano',  name:'Volcano Ring',     emoji:'🌋', unlockLevel:8,  laps:3, timeLimit:165, sky:0x2a1000, fogColor:0x3a1500, fogNear:40,  fogFar:200, groundColor:0x3a1500, bgColor:0x1a0500, weather:'lava',  desc:'Dodge lava on the crater rim' },
  { id:'coastal',  name:'Coastal Highway',  emoji:'🌊', unlockLevel:10, laps:4, timeLimit:185, sky:0x007ACC, fogColor:0x005580, fogNear:70,  fogFar:350, groundColor:0x5a8f6b, bgColor:0x001520, weather:'clear', desc:'Ocean-side sprint at sunset' },
];

// ── Track waypoints (closed loop, 20 control points each) ──
function generateTrackWaypoints(trackId) {
  const pts = [];
  // All tracks use a figure-8 / oval parametric layout scaled differently
  const configs = {
    city:     { rx:90, ry:60, corners:8, variant:'square'  },
    desert:   { rx:120,ry:50, corners:6, variant:'oval'    },
    mountain: { rx:80, ry:70, corners:10,variant:'winding' },
    snow:     { rx:85, ry:65, corners:9, variant:'oval'    },
    forest:   { rx:75, fy:80, corners:10,variant:'winding' },
    neon:     { rx:95, ry:55, corners:8, variant:'square'  },
    volcano:  { rx:70, ry:70, corners:6, variant:'ring'    },
    coastal:  { rx:110,ry:55, corners:7, variant:'oval'    },
  };
  const cfg = configs[trackId] || configs.city;
  const N = 20;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    let x, z;
    if (cfg.variant === 'square') {
      // Rounded rectangle loop
      const sq = Math.sign;
      x = cfg.rx * Math.cos(t) + (cfg.rx * 0.15) * Math.cos(3 * t);
      z = (cfg.ry || 60) * Math.sin(t) + ((cfg.ry||60) * 0.1) * Math.sin(2 * t);
    } else if (cfg.variant === 'ring') {
      x = cfg.rx * Math.cos(t);
      z = cfg.rx * Math.sin(t);
    } else if (cfg.variant === 'winding') {
      x = cfg.rx * Math.cos(t) + 20 * Math.sin(3 * t);
      z = (cfg.ry || 60) * Math.sin(t) + 12 * Math.cos(2 * t);
    } else {
      // Oval
      x = cfg.rx * Math.cos(t);
      z = (cfg.ry || 60) * Math.sin(t);
    }
    pts.push(new THREE.Vector3(x, 0, z));
  }
  return pts;
}

<script>
// ═══════════════════════════════════════════════════════════
//  TRACK BUILDER — generates road mesh, barriers, props
// ═══════════════════════════════════════════════════════════
let trackGroup = null;
let trackSpline = null;
let trackWaypoints = [];
let trackWidth = 14;

function buildTrack(trackDef) {
  if (trackGroup) { scene.remove(trackGroup); }
  trackGroup = new THREE.Group();
  scene.add(trackGroup);

  const pts = generateTrackWaypoints(trackDef.id);
  trackWaypoints = pts;

  // Closed catmull-rom spline
  const curve = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
  trackSpline = curve;

  const N = 120; // segments
  const tubeRadius = trackWidth / 2;

  // Road surface
  const roadPts = curve.getPoints(N);
  const roadShape = new THREE.Shape();
  roadShape.moveTo(-tubeRadius, 0);
  roadShape.lineTo(tubeRadius, 0);

  // Build road as a series of quads
  for (let i = 0; i < N; i++) {
    const t0 = i / N;
    const t1 = (i + 1) / N;
    const p0 = curve.getPointAt(t0);
    const p1 = curve.getPointAt(t1);
    const tan = curve.getTangentAt(t0);
    const right = new THREE.Vector3(-tan.z, 0, tan.x).normalize().multiplyScalar(tubeRadius);

    const v0 = p0.clone().add(right);
    const v1 = p0.clone().sub(right);
    const v2 = p1.clone().sub(right);
    const v3 = p1.clone().add(right);

    const roadGeo = new THREE.BufferGeometry();
    const verts = new Float32Array([
      v0.x,0.01,v0.z, v1.x,0.01,v1.z, v2.x,0.01,v2.z,
      v0.x,0.01,v0.z, v2.x,0.01,v2.z, v3.x,0.01,v3.z,
    ]);
    roadGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    roadGeo.computeVertexNormals();

    // Alternate road color for stripes
    const isStripe = Math.floor(i / 3) % 2 === 0;
    const roadMat = new THREE.MeshLambertMaterial({
      color: isStripe ? trackDef.groundColor : (trackDef.groundColor & 0xfefefe) + 0x080808
    });
    const roadMesh = new THREE.Mesh(roadGeo, roadMat);
    roadMesh.receiveShadow = true;
    trackGroup.add(roadMesh);

      // ── Safety barriers — tall concrete walls every segment ──────────────────
    {
      // Decide barrier style for this segment: every 6th = tire wall (corners),
      // every 18th = reflective warning arrow panel, rest = concrete
      const isTireWall  = (i % 6  === 0);
      const isArrow     = (i % 18 === 0);

      // Concrete base wall (tall, solid)
      const wallH  = 1.4;
      const wallD  = 3.8;
      const wallGeo = new THREE.BoxGeometry(0.32, wallH, wallD);

      // Concrete colour — alternate red/white stripes every 3 segments
      const stripeAlt = Math.floor(i / 3) % 2 === 0;
      const concreteMat = new THREE.MeshLambertMaterial({
        color: stripeAlt ? 0xeeeeee : 0xcc2222,
      });

      const wL = new THREE.Mesh(wallGeo, concreteMat);
      const wR = new THREE.Mesh(wallGeo, concreteMat);
      wL.position.copy(v1).add(new THREE.Vector3(0, wallH * 0.5, 0));
      wR.position.copy(v0).add(new THREE.Vector3(0, wallH * 0.5, 0));
      wL.lookAt(wL.position.clone().add(tan));
      wR.lookAt(wR.position.clone().add(tan));
      wL.castShadow = wR.castShadow = true;
      trackGroup.add(wL); trackGroup.add(wR);

      // Tire stack on top of every 6th barrier (corner protection)
      if (isTireWall) {
        const tireGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.22, 8);
        const tireMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        [[wL, v1],[wR, v0]].forEach(([wall, edge]) => {
          const tireStack = new THREE.Group();
          for (let ti = 0; ti < 3; ti++) {
            const t2 = new THREE.Mesh(tireGeo, tireMat);
            t2.rotation.z = Math.PI / 2;
            t2.position.set(0, wallH + 0.12 + ti * 0.24, (ti - 1) * 0.26);
            tireStack.add(t2);
          }
          tireStack.position.copy(wall.position);
          tireStack.rotation.copy(wall.rotation);
          tireStack.castShadow = true;
          trackGroup.add(tireStack);
        });
      }

      // Reflective yellow warning arrow panel before corners
      if (isArrow) {
        const arrowGeo = new THREE.BoxGeometry(0.08, 0.7, 0.5);
        const arrowMat = new THREE.MeshLambertMaterial({
          color: 0xFFD700, emissive: 0xaa8800, emissiveIntensity: 0.6,
        });
        [[wL, v1],[wR, v0]].forEach(([wall, edge]) => {
          const arrow = new THREE.Mesh(arrowGeo, arrowMat);
          arrow.position.copy(wall.position).add(new THREE.Vector3(0, wallH * 0.3, 0));
          arrow.rotation.copy(wall.rotation);
          trackGroup.add(arrow);
        });
      }
    }
  }

  // Ground plane (big flat ground under everything)
  const groundGeo = new THREE.PlaneGeometry(600, 600, 4, 4);
  const groundMat = new THREE.MeshLambertMaterial({
    color: trackDef.id === 'snow' ? 0xddeeff :
           trackDef.id === 'volcano' ? 0x2a1000 :
           trackDef.id === 'neon'    ? 0x080820 :
           trackDef.id === 'desert'  ? 0xc8a060 :
           trackDef.id === 'forest'  ? 0x1a4a1a : 0x4a7c4a
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  ground.position.y = -0.05;
  trackGroup.add(ground);

  // Skybox color
  renderer.setClearColor(new THREE.Color(trackDef.bgColor));
  scene.fog = new THREE.Fog(trackDef.fogColor, trackDef.fogNear, trackDef.fogFar);

  // Add decorative props based on track type
  addTrackProps(trackDef, curve, N);
  buildLighting(trackDef.sky, new THREE.Color(trackDef.groundColor).getHex());

  // Build spline lookup for boundary enforcement
  rebuildSplineSamples();

  // Start/Finish line marker
  const startPt = curve.getPointAt(0);
  const startTan = curve.getTangentAt(0);
  const lineGeo = new THREE.BoxGeometry(trackWidth * 1.1, 0.05, 0.6);
  const lineMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.position.copy(startPt);
  line.position.y = 0.03;
  line.rotation.y = Math.atan2(startTan.x, startTan.z);
  trackGroup.add(line);
}

function addTrackProps(trackDef, curve, N) {
  const mat_tree  = new THREE.MeshLambertMaterial({ color: 0x1a6e1a });
  const mat_trunk = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
  const mat_build = new THREE.MeshLambertMaterial({ color: 0x888899 });
  const mat_cactus= new THREE.MeshLambertMaterial({ color: 0x4a8a3a });

  for (let i = 0; i < N; i += 5) {
    const t = i / N;
    const pt = curve.getPointAt(t);
    const tan = curve.getTangentAt(t);
    const right = new THREE.Vector3(-tan.z, 0, tan.x).normalize();

    const side = Math.random() > 0.5 ? 1 : -1;
    const offset = (trackWidth / 2 + 3 + Math.random() * 8) * side;
    const pos = pt.clone().add(right.clone().multiplyScalar(offset));

    if (trackDef.id === 'forest' || trackDef.id === 'mountain' || trackDef.id === 'coastal') {
      // Tree
      const h = 4 + Math.random() * 4;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, h * 0.4, 5), mat_trunk);
      trunk.position.set(pos.x, h * 0.2, pos.z);
      const crown = new THREE.Mesh(new THREE.ConeGeometry(1.2 + Math.random(), h * 0.7, 5), mat_tree);
      crown.position.set(pos.x, h * 0.4 + h * 0.35, pos.z);
      trunk.castShadow = crown.castShadow = true;
      trackGroup.add(trunk); trackGroup.add(crown);
    } else if (trackDef.id === 'city' || trackDef.id === 'neon') {
      // Building
      const bh = 6 + Math.random() * 18;
      const bw = 3 + Math.random() * 4;
      const bGeo = new THREE.BoxGeometry(bw, bh, bw);
      const bMat = new THREE.MeshLambertMaterial({
        color: trackDef.id === 'neon' ? [0x330066, 0x003366, 0x660033, 0x006633][Math.floor(Math.random()*4)] : 0x778899,
        emissive: trackDef.id === 'neon' ? [0x220044, 0x002244, 0x440022, 0x004422][Math.floor(Math.random()*4)] : 0x000000,
        emissiveIntensity: trackDef.id === 'neon' ? 0.3 : 0,
      });
      const b = new THREE.Mesh(bGeo, bMat);
      b.position.set(pos.x, bh / 2, pos.z);
      b.castShadow = true;
      trackGroup.add(b);
    } else if (trackDef.id === 'desert') {
      // Cactus
      const cGeo = new THREE.CylinderGeometry(0.18, 0.2, 2.5, 5);
      const c = new THREE.Mesh(cGeo, mat_cactus);
      c.position.set(pos.x, 1.25, pos.z);
      c.castShadow = true;
      trackGroup.add(c);
    } else if (trackDef.id === 'snow') {
      // Snow mound
      const sg = new THREE.SphereGeometry(0.8 + Math.random(), 5, 4);
      const sm = new THREE.Mesh(sg, new THREE.MeshLambertMaterial({ color: 0xeeeeff }));
      sm.position.set(pos.x, 0.4, pos.z);
      sm.scale.y = 0.4;
      trackGroup.add(sm);
    } else if (trackDef.id === 'volcano') {
      // Lava rock
      const rg = new THREE.DodecahedronGeometry(0.8 + Math.random(), 0);
      const rm = new THREE.Mesh(rg, new THREE.MeshLambertMaterial({ color: 0x3a1a00, emissive: 0x550800, emissiveIntensity: 0.4 }));
      rm.position.set(pos.x, 0.4, pos.z);
      rm.castShadow = true;
      trackGroup.add(rm);
    }
  }
}

  data: {
    coins: 0,
    xp: 0,
    level: 1,
    selectedCar: 'speeder',
    selectedTrack: 'city',
    unlockedCars: ['speeder'],
    unlockedTracks: ['city','desert'],
    bestTimes: {},
    totalRaces: 0,
    totalWins: 0,
  },

  load() {
    try {
      const raw = localStorage.getItem('ddl_save');
      if (raw) {
        const parsed = JSON.parse(raw);
        Object.assign(this.data, parsed);
      }
    } catch(_) {}
    // Always guarantee starter content is unlocked regardless of save state
    if (!this.data.unlockedTracks || !Array.isArray(this.data.unlockedTracks)) {
      this.data.unlockedTracks = [];
    }
    if (!this.data.unlockedCars || !Array.isArray(this.data.unlockedCars)) {
      this.data.unlockedCars = [];
    }
    // Ensure starter tracks are always accessible
    ['city', 'desert'].forEach(id => {
      if (!this.data.unlockedTracks.includes(id)) this.data.unlockedTracks.push(id);
    });
    // Ensure starter car is always accessible
    if (!this.data.unlockedCars.includes('speeder')) this.data.unlockedCars.push('speeder');
    // Re-run level unlock check in case level was saved but unlocks weren't
    TRACK_DEFS.forEach(t => {
      if (t.unlockLevel <= this.data.level && !this.data.unlockedTracks.includes(t.id))
        this.data.unlockedTracks.push(t.id);
    });
    CAR_DEFS.forEach(c => {
      if (c.unlockLevel <= this.data.level && !this.data.unlockedCars.includes(c.id))
        this.data.unlockedCars.push(c.id);
    });
  },

  save() {
    try { localStorage.setItem('ddl_save', JSON.stringify(this.data)); } catch(_) {}
  },

  xpForLevel(lv) { return lv * lv * 120; },

  addXP(amount) {
    this.data.xp += amount;
    const needed = this.xpForLevel(this.data.level);
    if (this.data.xp >= needed) {
      this.data.xp -= needed;
      this.data.level++;
      showToast(`🎉 LEVEL UP! Now Level ${this.data.level}`, 3000);
      // Unlock tracks / cars at certain levels
      TRACK_DEFS.forEach(t => {
        if (t.unlockLevel <= this.data.level && !this.data.unlockedTracks.includes(t.id))
          this.data.unlockedTracks.push(t.id);
      });
      CAR_DEFS.forEach(c => {
        if (c.unlockLevel <= this.data.level && !this.data.unlockedCars.includes(c.id))
          this.data.unlockedCars.push(c.id);
      });
    }
    this.save();
    updateHudXP();
  },

  addCoins(amount) {
    this.data.coins += amount;
    this.save();
  },
};
Save.load();
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  AUDIO — Web Audio API (no external files)
// ═══════════════════════════════════════════════════════════
const Audio = {
  ctx: null,
  engineNode: null,
  engineGain: null,

  init() {
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(_) { this.ctx = null; }
  },

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },

  playTone(freq, type='sine', duration=0.15, vol=0.18, startTime=0) {
    if (!this.ctx) return;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.connect(gain); gain.connect(this.ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + startTime);
    gain.gain.setValueAtTime(vol, this.ctx.currentTime + startTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
    osc.start(this.ctx.currentTime + startTime);
    osc.stop(this.ctx.currentTime + startTime + duration + 0.01);
  },

  sfxCoin()    { this.playTone(880, 'sine', 0.1, 0.15); this.playTone(1100,'sine',0.1,0.1,0.08); },
  sfxBoost()   { this.playTone(200,'sawtooth',0.3,0.22); this.playTone(320,'sawtooth',0.25,0.18,0.1); },
  sfxHit()     { this.playTone(80,'sawtooth',0.18,0.25); this.playTone(60,'sawtooth',0.15,0.2,0.08); },
  sfxPickup()  { [440,550,660,880].forEach((f,i)=>this.playTone(f,'sine',0.12,0.12,i*0.06)); },
  sfxCountdown(){ this.playTone(440,'sine',0.2,0.3); },
  sfxCountdownGo(){ this.playTone(660,'square',0.35,0.35); this.playTone(880,'square',0.25,0.25,0.15); },
  sfxLap()     { [440,550,660,550,660,880].forEach((f,i)=>this.playTone(f,'sine',0.12,0.14,i*0.07)); },
  sfxFinish()  { [440,550,660,880,1100,1320].forEach((f,i)=>this.playTone(f,'sine',0.2,0.18,i*0.09)); },
  sfxShield()  { this.playTone(600,'sine',0.2,0.2); this.playTone(800,'sine',0.15,0.15,0.1); },
  sfxFreeze()  { this.playTone(300,'sine',0.3,0.2); this.playTone(200,'sine',0.25,0.15,0.1); },

  // Engine loop — pitch based on speed
  startEngine() {
    if (!this.ctx) return;
    if (this.engineNode) this.stopEngine();
    this.engineGain = this.ctx.createGain();
    this.engineGain.gain.value = 0.04;
    this.engineGain.connect(this.ctx.destination);
    this.engineNode = this.ctx.createOscillator();
    this.engineNode.type = 'sawtooth';
    this.engineNode.frequency.value = 80;
    this.engineNode.connect(this.engineGain);
    this.engineNode.start();
  },

  updateEngine(speed, maxSpeed) {
    if (!this.engineNode) return;
    const ratio = Math.min(speed / maxSpeed, 1);
    const freq = 55 + ratio * 180;
    const vol  = 0.02 + ratio * 0.055;
    this.engineNode.frequency.setTargetAtTime(freq, this.ctx.currentTime, 0.05);
    this.engineGain.gain.setTargetAtTime(vol, this.ctx.currentTime, 0.05);
  },

  stopEngine() {
    if (this.engineNode) { try { this.engineNode.stop(); } catch(_) {} this.engineNode = null; }
    if (this.engineGain) { this.engineGain.disconnect(); this.engineGain = null; }
  },
};
Audio.init();

// Resume audio on first user interaction
document.addEventListener('pointerdown', () => Audio.resume(), { once: true });
document.addEventListener('keydown', () => Audio.resume(), { once: true });
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  INPUT  — Keyboard + Mobile Joystick
// ═══════════════════════════════════════════════════════════
const Keys = { up:false, down:false, left:false, right:false, space:false, p:false };

document.addEventListener('keydown', e => {
  switch(e.code) {
    case 'ArrowUp':    Keys.up    = true; e.preventDefault(); break;
    case 'ArrowDown':  Keys.down  = true; e.preventDefault(); break;
    case 'ArrowLeft':  Keys.left  = true; e.preventDefault(); break;
    case 'ArrowRight': Keys.right = true; e.preventDefault(); break;
    case 'Space':
      Keys.space = true;
      e.preventDefault();
      // Space = direct Nitro Burst regardless of held power-up
      if (GameState.mode === 'racing') activateNitro();
      break;
    case 'KeyP': case 'Escape':
      if (GameState.mode === 'racing') pauseRace();
      else if (GameState.mode === 'paused') resumeRace();
      break;
    case 'KeyC':
      if (GameState.mode === 'racing') cycleCameraMode(); break;
  }
});

document.addEventListener('keyup', e => {
  switch(e.code) {
    case 'ArrowUp':    Keys.up    = false; break;
    case 'ArrowDown':  Keys.down  = false; break;
    case 'ArrowLeft':  Keys.left  = false; break;
    case 'ArrowRight': Keys.right = false; break;
    case 'Space':      Keys.space = false; break;
  }
});

// Mobile discrete buttons — replaces analog joystick
const MobileInput = { steerX: 0, steerY: 0, gas: false, brake: false, left: false, right: false };

(function setupMobileButtons() {
  // Helper: hold-while-pressed for a button and a MobileInput boolean property
  function holdBtn(id, prop) {
    const btn = document.getElementById(id);
    if (!btn) return;
    function on(e)  { e.preventDefault(); MobileInput[prop] = true;  }
    function off(e) { e.preventDefault(); MobileInput[prop] = false; }
    btn.addEventListener('touchstart',  on,  { passive: false });
    btn.addEventListener('touchend',    off, { passive: false });
    btn.addEventListener('touchcancel', off, { passive: false });
    btn.addEventListener('mousedown',   on);
    btn.addEventListener('mouseup',     off);
    btn.addEventListener('mouseleave',  off);
  }

  holdBtn('btn-gas',   'gas');
  holdBtn('btn-brake', 'brake');
  holdBtn('btn-left',  'left');
  holdBtn('btn-right', 'right');

  // Boost button — fires nitro directly on press
  const btnBoost = document.getElementById('btn-boost');
  if (btnBoost) {
    btnBoost.addEventListener('touchstart', e => { e.preventDefault(); activateNitro(); }, { passive: false });
    btnBoost.addEventListener('mousedown',  () => activateNitro());
  }

  // Camera button
  const btnCam = document.getElementById('btn-cam');
  if (btnCam) {
    btnCam.addEventListener('touchstart', e => { e.preventDefault(); cycleCameraMode(); }, { passive: false });
    btnCam.addEventListener('mousedown',  () => cycleCameraMode());
  }
})();

function isMobile() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth < 768;
}
