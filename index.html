<script>
// ═══════════════════════════════════════════════════════════
//  TRACK BOUNDARY SYSTEM
//  Finds the closest point on the spline, measures lateral
//  offset from the centreline, and bounces the car back if
//  it exceeds (trackWidth/2).  No shortcuts. No going OOB.
// ═══════════════════════════════════════════════════════════

// Cache: sample the spline once at track-build time into a
// lookup array so per-frame nearest-point search is O(N) but
// N is small (200 samples) — fast enough at 60fps.
let _splineSamples = [];      // { pt, tan, right }[]
const SPLINE_SAMPLES = 200;   // resolution of the lookup

function rebuildSplineSamples() {
  _splineSamples = [];
  if (!trackSpline) return;
  for (let i = 0; i < SPLINE_SAMPLES; i++) {
    const t   = i / SPLINE_SAMPLES;
    const pt  = trackSpline.getPointAt(t);
    const tan = trackSpline.getTangentAt(t);
    // right-hand vector perpendicular to tangent (flat ground)
    const right = new THREE.Vector3(-tan.z, 0, tan.x).normalize();
    _splineSamples.push({ pt, tan, right });
  }
}

// Returns { centre, right, lateralOffset, sampleIdx }
// lateralOffset > 0  → car is to the right of centre
// lateralOffset < 0  → car is to the left  of centre
function getNearestTrackPoint(worldPos) {
  if (!_splineSamples.length) return null;
  let bestDist = Infinity, bestIdx = 0;
  for (let i = 0; i < _splineSamples.length; i++) {
    const dx = worldPos.x - _splineSamples[i].pt.x;
    const dz = worldPos.z - _splineSamples[i].pt.z;
    const d  = dx * dx + dz * dz;
    if (d < bestDist) { bestDist = d; bestIdx = i; }
  }
  const s   = _splineSamples[bestIdx];
  const dx  = worldPos.x - s.pt.x;
  const dz  = worldPos.z - s.pt.z;
  const lat = dx * s.right.x + dz * s.right.z; // dot → signed lateral offset
  return { centre: s.pt, right: s.right, tan: s.tan, lateralOffset: lat, sampleIdx: bestIdx };
}

// Called once per physics tick — enforces the hard wall boundary
let _barrierFlash = 0; // seconds remaining for flash effect

function enforceTrackBoundary(p) {
  if (!_splineSamples.length) return;

  const halfWidth  = (trackWidth / 2) - 0.9; // 0.9 = car half-width clearance
  const info = getNearestTrackPoint(p.pos);
  if (!info) return;

  const lat = info.lateralOffset;
  const overshoot = Math.abs(lat) - halfWidth;

  if (overshoot <= 0) return; // still inside track — nothing to do

  // ── Collision response ───────────────────────────────────
  // 1. Push car back to the wall edge
  const sign      = lat > 0 ? 1 : -1;
  const pushBack  = info.right.clone().multiplyScalar(sign * (halfWidth - Math.abs(lat)));
  p.pos.add(pushBack);
  p.mesh.position.copy(p.pos);
  p.mesh.position.y = 0;

  // 2. Reflect velocity component perpendicular to wall
  //    — keep tangential (along-track) speed, dampen it a bit
  //    — kill lateral (into-wall) speed and bounce gently
  const tangential = p.speed * (
    Math.sin(p.heading) * info.tan.x + Math.cos(p.heading) * info.tan.z
  );
  p.speed = tangential * 0.72; // lose ~28% on impact

  // 3. Redirect heading towards track tangent direction,
  //    biased so car faces roughly forward on the circuit
  const tanAngle  = Math.atan2(info.tan.x, info.tan.z);
  // Choose the tangent direction that's closer to current heading (fwd/bwd)
  let dA = tanAngle - p.heading;
  while (dA >  Math.PI) dA -= Math.PI * 2;
  while (dA < -Math.PI) dA += Math.PI * 2;
  p.heading += dA * 0.45; // blend 45% towards tangent per hit frame

  // 4. Visual: brief invincibility flash (but no health damage from barriers)
  if (_barrierFlash <= 0) {
    _barrierFlash = 0.35;
    spawnHitParticles(p.pos, 0xddddcc); // concrete dust
    // Rumble: quick camera shake via a tiny heading nudge
    p.heading += (Math.random() - 0.5) * 0.06;
  }
}

function tickBarrierFlash(dt) {
  if (_barrierFlash > 0) {
    _barrierFlash -= dt;
    // Flash car mesh white during impact
    if (GameState.player.mesh) {
      const flashOn = Math.floor(_barrierFlash / 0.07) % 2 === 0;
      GameState.player.mesh.traverse(child => {
        if (child.isMesh && child.material && child.material.emissive) {
          child.material.emissiveIntensity = flashOn ? 0.55 : 0;
          if (flashOn) child.material.emissive.setHex(0xffffff);
        }
      });
    }
  } else if (GameState.player.mesh) {
    // Restore normal emissive state
    GameState.player.mesh.traverse(child => {
      if (child.isMesh && child.material && child.material.emissive) {
        child.material.emissiveIntensity = 0;
      }
    });
  }
}


function updatePlayerPhysics(dt, carDef) {
  const p = GameState.player;
  if (!p.mesh) return;

  const frozen  = p.frozen > 0;
  const boosting = p.boosting > 0;
  const speedMult = boosting ? 1.5 : (frozen ? 0.3 : 1.0);
  const accel    = carDef.accel * speedMult;
  const maxSpeed = carDef.maxSpeed * speedMult;
  const handling = carDef.handling * (frozen ? 0.4 : 1.0);

  // Inputs: combine keyboard and mobile discrete buttons
  const gasIn   = Keys.up    || MobileInput.gas;
  const brakeIn = Keys.down  || MobileInput.brake;
  const leftIn  = Keys.left  || MobileInput.left;
  const rightIn = Keys.right || MobileInput.right;

  // Steering amount — full handling value when any steer button is held
  const steerAmt = handling;

  // Acceleration
  if (gasIn)   p.speed = Math.min(p.speed + accel * dt, maxSpeed);
  else if (brakeIn) {
    p.speed = Math.max(p.speed - carDef.accel * carDef.braking * 2 * dt, -maxSpeed * 0.4);
    p.braking = true;
  } else {
    // Coast friction
    p.speed *= (1 - 0.9 * dt);
    p.braking = false;
  }
  if (!brakeIn) p.braking = false;

  // Steering — proportional to speed
  const speedRatio = Math.min(Math.abs(p.speed) / Math.max(maxSpeed * 0.15, 1), 1);
  let steer = 0;
  if (leftIn || MobileInput.steerX < -0.15)  steer = -steerAmt * speedRatio * 1.8;
  if (rightIn || MobileInput.steerX >  0.15) steer =  steerAmt * speedRatio * 1.8;
  if (p.speed < 0) steer *= -1;

  p.heading += steer * dt;
  p.angularVel = steer;

  // Move
  const dir = new THREE.Vector3(Math.sin(p.heading), 0, Math.cos(p.heading));
  p.pos.addScaledVector(dir, p.speed * dt);

  // Apply to mesh
  p.mesh.position.copy(p.pos);
  p.mesh.rotation.y = p.heading;

  // Wheel rotation (visual only)
  if (p.mesh.userData.wheels) {
    const rollAmt = p.speed * dt * 0.9;
    p.mesh.userData.wheels.forEach((w, i) => {
      w.rotation.x -= rollAmt;
      // Front wheels steer
      if (i < 2) w.rotation.y = steer * 0.4;
    });
  }

  // Brake lights
  if (p.mesh.userData.brakeLights) {
    p.mesh.userData.brakeLights.forEach(l => {
      l.material.emissive.setHex(p.braking ? 0x880000 : 0x220000);
      l.material.emissiveIntensity = p.braking ? 0.9 : 0;
    });
  }

  // Decrement timers
  if (p.frozen > 0)   p.frozen   -= dt;
  if (p.boosting > 0) p.boosting -= dt;
  if (p.shielded > 0) p.shielded -= dt;
  if (p.magnetized > 0) p.magnetized -= dt;
  if (p.invincible > 0) p.invincible -= dt;

  // Keep on ground (clamp Y)
  p.pos.y = 0;
  p.mesh.position.y = 0;

  // ── Track boundary enforcement — walls keep car on course ──
  enforceTrackBoundary(p);
  tickBarrierFlash(dt);

  // Slight body tilt on steering
  p.mesh.rotation.z = -steer * 0.12;
  p.mesh.rotation.x =  (p.speed / maxSpeed) * 0.04;

  // Audio
  Audio.updateEngine(Math.abs(p.speed), maxSpeed);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  OPPONENTS — 4 AI cars
// ═══════════════════════════════════════════════════════════
const AI_COLORS = [0x4488ff, 0xff8800, 0x44ff88, 0xff44aa];
const AI_NAMES  = ['RIVAL-X', 'TURBO-J', 'BLAZE-K', 'NIGHT-R'];

function spawnOpponents(trackDef, carDef) {
  // Remove old opponents
  GameState.opponents.forEach(o => { if (o.mesh) scene.remove(o.mesh); });
  GameState.opponents = [];

  const startPt = trackSpline ? trackSpline.getPointAt(0) : new THREE.Vector3(0,0,0);
  const startTan = trackSpline ? trackSpline.getTangentAt(0) : new THREE.Vector3(0,0,1);
  const startAngle = Math.atan2(startTan.x, startTan.z);

  for (let i = 0; i < 4; i++) {
    const aiCarDef = { ...carDef, color: AI_COLORS[i], maxSpeed: carDef.maxSpeed * (0.82 + Math.random() * 0.14), accel: carDef.accel * (0.8 + Math.random() * 0.15) };
    const mesh = buildCarMesh(aiCarDef, false);
    scene.add(mesh);

    const offset = (i - 1.5) * 3.2;
    const spawnPos = startPt.clone().addScaledVector(startTan, -4 - i * 5);
    const right = new THREE.Vector3(-startTan.z, 0, startTan.x);
    spawnPos.addScaledVector(right, offset);

    mesh.position.copy(spawnPos);
    mesh.rotation.y = startAngle;

    const opp = {
      mesh,
      pos: spawnPos.clone(),
      speed: 0,
      heading: startAngle,
      waypointT: 0.001 * (i + 1),
      lapCount: 0,
      lapWaypointIdx: 0,
      maxSpeed: aiCarDef.maxSpeed,
      accel: aiCarDef.accel,
      name: AI_NAMES[i],
    };
    GameState.opponents.push(opp);
  }
}

function updateOpponents(dt, laps) {
  if (!trackSpline) return;

  GameState.opponents.forEach(opp => {
    // Follow the spline with a lookahead point
    opp.waypointT += (opp.speed / (trackSpline.getLength() || 100)) * dt;
    if (opp.waypointT >= 1) { opp.waypointT -= 1; opp.lapCount++; }

    const target = trackSpline.getPointAt(Math.min(opp.waypointT, 0.9999));
    const dx = target.x - opp.pos.x;
    const dz = target.z - opp.pos.z;
    const targetAngle = Math.atan2(dx, dz);

    // Smooth heading towards target
    let dAngle = targetAngle - opp.heading;
    while (dAngle >  Math.PI) dAngle -= Math.PI * 2;
    while (dAngle < -Math.PI) dAngle += Math.PI * 2;
    opp.heading += Math.min(Math.max(dAngle, -2.5 * dt), 2.5 * dt);

    // Speed follows spline curvature (slow in corners)
    const curv = Math.abs(dAngle);
    const speedTarget = opp.maxSpeed * Math.max(0.55, 1 - curv * 0.4);
    opp.speed += (speedTarget - opp.speed) * Math.min(dt * 2, 1);

    const dir = new THREE.Vector3(Math.sin(opp.heading), 0, Math.cos(opp.heading));
    opp.pos.addScaledVector(dir, opp.speed * dt);
    opp.pos.y = 0;

    opp.mesh.position.copy(opp.pos);
    opp.mesh.rotation.y = opp.heading;

    // AI boundary enforcement — same wall rules as the player
    if (_splineSamples.length) {
      const halfW = (trackWidth / 2) - 0.9;
      const info  = getNearestTrackPoint(opp.pos);
      if (info) {
        const lat = info.lateralOffset;
        const over = Math.abs(lat) - halfW;
        if (over > 0) {
          const sign = lat > 0 ? 1 : -1;
          opp.pos.add(info.right.clone().multiplyScalar(sign * (halfW - Math.abs(lat))));
          opp.mesh.position.copy(opp.pos);
          opp.mesh.position.y = 0;
          opp.speed *= 0.65;
          // Re-align heading to track tangent
          const ta = Math.atan2(info.tan.x, info.tan.z);
          let dA = ta - opp.heading;
          while (dA >  Math.PI) dA -= Math.PI * 2;
          while (dA < -Math.PI) dA += Math.PI * 2;
          opp.heading += dA * 0.5;
        }
      }
    }

    // Wheel spin
    if (opp.mesh.userData.wheels) {
      opp.mesh.userData.wheels.forEach(w => { w.rotation.x -= opp.speed * dt * 0.9; });
    }

    // Check lap completion
    if (opp.lapCount >= laps) opp.lapCount = laps;
  });
}

function getPlayerPosition() {
  // Returns 1-5 based on lap + waypoint progress
  const p = GameState.player;
  const playerProgress = p.lapCount + (p.lapWaypointIdx / Math.max(trackWaypoints.length, 1));
  let ahead = 0;
  GameState.opponents.forEach(o => {
    const oProgress = o.lapCount + o.waypointT;
    if (oProgress > playerProgress) ahead++;
  });
  return ahead + 1;
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  OBSTACLES — traffic, oil slicks, cones, barriers
// ═══════════════════════════════════════════════════════════
const OBSTACLE_TYPES = ['traffic','traffic','traffic','oil','cone','cone','barrier'];
let obstacleSpawnTimer = 0;

function spawnObstacle() {
  if (!trackSpline) return;
  const t = Math.random();
  const pt = trackSpline.getPointAt(t);
  const tan = trackSpline.getTangentAt(t);
  const right = new THREE.Vector3(-tan.z, 0, tan.x);
  const offset = (Math.random() - 0.5) * (trackWidth * 0.6);
  pt.addScaledVector(right, offset);

  const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
  let mesh;

  if (type === 'traffic') {
    // Simple traffic car
    const tCar = new THREE.Group();
    const colors = [0xcc4444, 0x4444cc, 0x44cc44, 0xcccc44, 0xffffff];
    const col = colors[Math.floor(Math.random() * colors.length)];
    const b = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 3.5), new THREE.MeshLambertMaterial({color:col}));
    b.position.y = 0.38;
    const c = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.8), new THREE.MeshLambertMaterial({color:0x111122}));
    c.position.set(0, 0.72, -0.3);
    tCar.add(b); tCar.add(c);
    tCar.castShadow = true;
    mesh = tCar;
  } else if (type === 'oil') {
    const og = new THREE.Mesh(new THREE.CircleGeometry(1.8, 8), new THREE.MeshLambertMaterial({color:0x110022, transparent:true, opacity:0.75}));
    og.rotation.x = -Math.PI / 2;
    og.position.y = 0.02;
    mesh = og;
  } else if (type === 'cone') {
    const cg = new THREE.ConeGeometry(0.25, 0.8, 6);
    const cm = new THREE.MeshLambertMaterial({ color: 0xff6600 });
    mesh = new THREE.Mesh(cg, cm);
    mesh.position.y = 0.4;
  } else { // barrier
    const bg = new THREE.BoxGeometry(0.4, 0.9, 2.8);
    const bm = new THREE.MeshLambertMaterial({ color: 0xdddddd });
    mesh = new THREE.Mesh(bg, bm);
    mesh.position.y = 0.45;
  }

  mesh.position.x = pt.x;
  mesh.position.z = pt.z;
  mesh.castShadow = true;
  scene.add(mesh);

  GameState.obstacles.push({
    mesh,
    type,
    pos: new THREE.Vector3(pt.x, 0, pt.z),
    radius: type === 'oil' ? 1.8 : type === 'traffic' ? 2.0 : 0.6,
    // Traffic cars slowly move
    speed: type === 'traffic' ? (4 + Math.random() * 8) : 0,
    heading: Math.atan2(tan.x, tan.z),
    waypointT: t,
    active: true,
  });
}

function updateObstacles(dt) {
  // Spawn traffic periodically
  obstacleSpawnTimer -= dt;
  if (obstacleSpawnTimer <= 0) {
    obstacleSpawnTimer = 2.5 + Math.random() * 3.0;
    spawnObstacle();
  }

  // Limit max obstacles
  while (GameState.obstacles.length > 28) {
    const old = GameState.obstacles.shift();
    if (old.mesh) scene.remove(old.mesh);
  }

  // Move traffic cars along spline
  GameState.obstacles.forEach(obs => {
    if (!obs.active || obs.speed <= 0 || !trackSpline) return;
    obs.waypointT += (obs.speed / (trackSpline.getLength() || 100)) * dt;
    if (obs.waypointT >= 1) obs.waypointT -= 1;
    const pt = trackSpline.getPointAt(obs.waypointT);
    const tan = trackSpline.getTangentAt(obs.waypointT);
    obs.pos.set(pt.x, 0, pt.z);
    obs.mesh.position.set(pt.x, obs.mesh.position.y, pt.z);
    obs.mesh.rotation.y = Math.atan2(tan.x, tan.z);
  });
}

function checkObstacleCollisions() {
  const p = GameState.player;
  if (p.invincible > 0 || p.finishedRace) return;

  GameState.obstacles.forEach(obs => {
    if (!obs.active) return;
    const dx = p.pos.x - obs.pos.x;
    const dz = p.pos.z - obs.pos.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist < obs.radius + 1.2) {
      if (obs.type === 'oil') {
        // Slide out — don't reduce health
        p.speed *= 0.6;
        p.heading += 0.3 * (Math.random() > 0.5 ? 1 : -1);
        showToast('🛢 OIL SLICK!', 800);
      } else if (p.shielded > 0) {
        // Shield blocks hit
        obs.active = false;
        scene.remove(obs.mesh);
        spawnHitParticles(obs.pos, 0x00aaff);
        Audio.sfxShield();
        showToast('🛡 SHIELD ABSORBED HIT!', 1000);
      } else {
        // Take damage
        const dmg = obs.type === 'traffic' ? 18 : 10;
        p.health = Math.max(0, p.health - dmg);
        p.invincible = 1.2;
        p.speed *= 0.3;
        spawnHitParticles(p.pos, 0xff4422);
        Audio.sfxHit();
        updateHealthHUD();
        if (p.health <= 0) {
          p.health = 15; // Don't fully die — respawn with min health
          p.invincible = 3.0;
          p.speed = 0;
          showToast('💥 CRASHED! Respawning…', 1800);
        }
      }
    }
  });
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  POWER-UPS — spawn, collect, use
// ═══════════════════════════════════════════════════════════
const POWERUP_DEFS = [
  { id:'nitro',   icon:'⚡', name:'NITRO BURST',    color:0xff6d00, duration:4   },
  { id:'shield',  icon:'🛡', name:'SHIELD',         color:0x00aaff, duration:8   },
  { id:'magnet',  icon:'🧲', name:'COIN MAGNET',    color:0xffcc00, duration:10  },
  { id:'wind',    icon:'🌪', name:'WIND BLAST',     color:0x88ddff, duration:0   },
  { id:'freeze',  icon:'❄',  name:'FREEZE PULSE',   color:0x44ccff, duration:3   },
  { id:'repair',  icon:'🔧', name:'INSTANT REPAIR', color:0x00e676, duration:0   },
];

let powerupSpawnTimer = 0;

function spawnPowerup() {
  if (!trackSpline || GameState.powerups.length >= 8) return;
  const t = Math.random();
  const pt = trackSpline.getPointAt(t);
  const tan = trackSpline.getTangentAt(t);
  const right = new THREE.Vector3(-tan.z, 0, tan.x);
  const offset = (Math.random() - 0.5) * (trackWidth * 0.55);
  pt.addScaledVector(right, offset);

  const def = POWERUP_DEFS[Math.floor(Math.random() * POWERUP_DEFS.length)];

  // Floating spinning box
  const geo = new THREE.BoxGeometry(1.1, 1.1, 1.1);
  const mat = new THREE.MeshLambertMaterial({ color: def.color, emissive: def.color, emissiveIntensity: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pt.x, 0.7, pt.z);
  mesh.castShadow = true;
  scene.add(mesh);

  // Glow ring
  const ringGeo = new THREE.RingGeometry(0.7, 0.9, 12);
  const ringMat = new THREE.MeshLambertMaterial({ color: def.color, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(pt.x, 0.05, pt.z);
  scene.add(ring);

  GameState.powerups.push({
    mesh, ring, def,
    pos: new THREE.Vector3(pt.x, 0, pt.z),
    spawnT: performance.now(),
    active: true,
  });
}

function updatePowerups(dt) {
  powerupSpawnTimer -= dt;
  if (powerupSpawnTimer <= 0) {
    powerupSpawnTimer = 4 + Math.random() * 5;
    spawnPowerup();
  }

  const t = performance.now() * 0.001;
  const p = GameState.player;

  GameState.powerups.forEach(pu => {
    if (!pu.active) return;
    // Float + spin
    pu.mesh.rotation.y = t * 2;
    pu.mesh.position.y = 0.7 + Math.sin(t * 2.5 + pu.pos.x) * 0.2;
    pu.ring.rotation.z = t;

    // Coin magnet: pull towards player
    if (p.magnetized > 0) {
      // Handled in coins section
    }

    // Check pickup by player
    const dx = p.pos.x - pu.pos.x;
    const dz = p.pos.z - pu.pos.z;
    if (Math.sqrt(dx*dx + dz*dz) < 2.0) {
      pu.active = false;
      scene.remove(pu.mesh);
      scene.remove(pu.ring);
      GameState.heldPowerup = pu.def;
      updatePowerupHUD();
      Audio.sfxPickup();
      showToast(`${pu.def.icon} ${pu.def.name} READY!`, 1500);
    }
  });

  GameState.powerups = GameState.powerups.filter(pu => pu.active);
}

// ── Nitro — direct boost, always available via Space / ⚡ button ────────────
// Activates a 3-second nitro burst. Independent of the held power-up slot.
let nitroCooldown = 0; // seconds remaining on cooldown

function activateNitro() {
  if (GameState.mode !== 'racing') return;
  if (nitroCooldown > 0) {
    showToast(`⚡ NITRO RECHARGING… ${nitroCooldown.toFixed(1)}s`, 800);
    return;
  }
  const p = GameState.player;
  p.boosting = 3.5;
  nitroCooldown = 8; // 8s cooldown before next nitro
  Audio.sfxBoost();
  showToast('⚡ NITRO BURST!', 1200);
  spawnBoostParticles();
}

// Tick nitro cooldown in game loop (called from gameLoop)
function tickNitroCooldown(dt) {
  if (nitroCooldown > 0) nitroCooldown = Math.max(0, nitroCooldown - dt);
}

function usePowerup() {
  const pu = GameState.heldPowerup;
  if (!pu || GameState.mode !== 'racing') return;
  const p = GameState.player;

  switch(pu.id) {
    case 'nitro':
      p.boosting = pu.duration;
      Audio.sfxBoost();
      showToast('⚡ NITRO BURST!', 1200);
      spawnBoostParticles();
      break;
    case 'shield':
      p.shielded = pu.duration;
      Audio.sfxShield();
      showToast('🛡 SHIELD ACTIVE!', 1200);
      break;
    case 'magnet':
      p.magnetized = pu.duration;
      showToast('🧲 COIN MAGNET!', 1200);
      break;
    case 'wind':
      // Push nearby opponents away
      GameState.opponents.forEach(opp => {
        const dx = opp.pos.x - p.pos.x;
        const dz = opp.pos.z - p.pos.z;
        const dist = Math.sqrt(dx*dx + dz*dz);
        if (dist < 25) {
          const pushDir = new THREE.Vector3(dx, 0, dz).normalize();
          opp.pos.addScaledVector(pushDir, 12);
          opp.speed *= 0.4;
          opp.mesh.position.copy(opp.pos);
        }
      });
      showToast('🌪 WIND BLAST!', 1200);
      spawnHitParticles(p.pos, 0x88ddff);
      break;
    case 'freeze':
      // Slow opponents
      GameState.opponents.forEach(opp => { opp.speed *= 0.2; });
      Audio.sfxFreeze();
      showToast('❄ FREEZE PULSE!', 1200);
      spawnHitParticles(p.pos, 0x44ccff);
      break;
    case 'repair':
      p.health = Math.min(100, p.health + 55);
      updateHealthHUD();
      showToast('🔧 REPAIRED!', 1200);
      spawnHitParticles(p.pos, 0x00e676);
      break;
  }

  GameState.heldPowerup = null;
  updatePowerupHUD();
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  COINS — spawn, collect, magnet
// ═══════════════════════════════════════════════════════════
let coinSpawnTimer = 0;
const coinGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.12, 8);
const coinMat = new THREE.MeshLambertMaterial({ color: 0xFFD700, emissive: 0xaa8800, emissiveIntensity: 0.5 });

function spawnCoin() {
  if (!trackSpline || GameState.coins.length >= 40) return;
  const t = Math.random();
  const pt = trackSpline.getPointAt(t);
  const tan = trackSpline.getTangentAt(t);
  const right = new THREE.Vector3(-tan.z, 0, tan.x);
  const offset = (Math.random() - 0.5) * (trackWidth * 0.7);
  pt.addScaledVector(right, offset);

  const mesh = new THREE.Mesh(coinGeo, coinMat);
  mesh.position.set(pt.x, 0.45, pt.z);
  mesh.castShadow = true;
  scene.add(mesh);

  GameState.coins.push({
    mesh,
    pos: new THREE.Vector3(pt.x, 0, pt.z),
    active: true,
    value: Math.random() < 0.15 ? 5 : 1,
  });
}

function updateCoins(dt) {
  coinSpawnTimer -= dt;
  if (coinSpawnTimer <= 0) {
    coinSpawnTimer = 0.8 + Math.random() * 1.2;
    spawnCoin();
    spawnCoin(); // Spawn 2 at a time
  }

  const t = performance.now() * 0.001;
  const p = GameState.player;

  GameState.coins.forEach(coin => {
    if (!coin.active) return;
    coin.mesh.rotation.y = t * 3;

    let dx = p.pos.x - coin.pos.x;
    let dz = p.pos.z - coin.pos.z;
    const dist = Math.sqrt(dx*dx + dz*dz);

    // Magnet pull
    if (p.magnetized > 0 && dist < 18) {
      const pullSpeed = 28 * dt;
      const nx = dx / dist, nz = dz / dist;
      coin.pos.x += nx * pullSpeed;
      coin.pos.z += nz * pullSpeed;
      coin.mesh.position.x = coin.pos.x;
      coin.mesh.position.z = coin.pos.z;
      dx = p.pos.x - coin.pos.x;
      dz = p.pos.z - coin.pos.z;
    }

    if (Math.sqrt(dx*dx + dz*dz) < 1.6) {
      coin.active = false;
      scene.remove(coin.mesh);
      GameState.player.totalTime; // just access to avoid lint
      const earned = coin.value;
      Save.addCoins(earned);
      document.getElementById('hud-coins').textContent = Save.data.coins;
      Audio.sfxCoin();
    }
  });

  GameState.coins = GameState.coins.filter(c => c.active);
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES — hit sparks, boost trail, coin collect
// ═══════════════════════════════════════════════════════════
function spawnHitParticles(pos, color) {
  for (let i = 0; i < 12; i++) {
    const geo = new THREE.SphereGeometry(0.12, 4, 4);
    const mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos).add(new THREE.Vector3(0, 0.5, 0));
    scene.add(mesh);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 14,
      Math.random() * 10 + 2,
      (Math.random() - 0.5) * 14
    );
    GameState.particles.push({ mesh, vel, life: 0.8 + Math.random() * 0.4 });
  }
}

function spawnBoostParticles() {
  const p = GameState.player;
  const dir = new THREE.Vector3(Math.sin(p.heading), 0, Math.cos(p.heading));
  for (let i = 0; i < 20; i++) {
    const geo = new THREE.SphereGeometry(0.09 + Math.random() * 0.14, 4, 4);
    const mat = new THREE.MeshLambertMaterial({ color: 0xff6d00, emissive: 0xff4400, emissiveIntensity: 1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(p.pos).add(new THREE.Vector3(0, 0.4, 0));
    scene.add(mesh);
    const vel = dir.clone().negate().multiplyScalar(6 + Math.random() * 8).add(
      new THREE.Vector3((Math.random()-0.5)*4, Math.random()*3, (Math.random()-0.5)*4)
    );
    GameState.particles.push({ mesh, vel, life: 0.5 + Math.random() * 0.3 });
  }
}

function updateParticles(dt) {
  GameState.particles.forEach(pt => {
    pt.life -= dt;
    pt.vel.y -= 14 * dt;
    pt.mesh.position.addScaledVector(pt.vel, dt);
    const s = Math.max(pt.life, 0.05);
    pt.mesh.scale.setScalar(s);
    if (pt.life <= 0) scene.remove(pt.mesh);
  });
  GameState.particles = GameState.particles.filter(pt => pt.life > 0);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  WEATHER PARTICLES — snow, rain, sparks
// ═══════════════════════════════════════════════════════════
function initWeather(type) {
  clearWeather();
  if (type === 'snow') {
    for (let i = 0; i < 200; i++) {
      const geo = new THREE.SphereGeometry(0.08 + Math.random() * 0.1, 4, 4);
      const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set((Math.random() - 0.5) * 80, Math.random() * 30, (Math.random() - 0.5) * 80);
      scene.add(mesh);
      GameState.weather.push({ mesh, type: 'snow', vy: -(0.8 + Math.random() * 1.5) });
    }
  } else if (type === 'lava') {
    // Add lava glow lights near the track
    for (let i = 0; i < 6; i++) {
      const light = new THREE.PointLight(0xff4400, 2, 40);
      const t = i / 6;
      const pt = trackSpline ? trackSpline.getPointAt(t) : new THREE.Vector3(i * 20, 0, 0);
      light.position.set(pt.x, 2, pt.z);
      scene.add(light);
      GameState.weather.push({ light, type: 'lava_light' });
    }
  } else if (type === 'night') {
    // Street lights along track
    if (trackSpline) {
      for (let i = 0; i < 16; i++) {
        const t = i / 16;
        const pt = trackSpline.getPointAt(t);
        const light = new THREE.PointLight(0xffeedd, 1.5, 30);
        light.position.set(pt.x, 5, pt.z);
        scene.add(light);
        GameState.weather.push({ light, type: 'street_light' });
        // Pole mesh
        const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 5, 5), new THREE.MeshLambertMaterial({ color: 0x888888 }));
        pole.position.set(pt.x, 2.5, pt.z);
        scene.add(pole);
        GameState.weather.push({ mesh: pole, type: 'pole' });
      }
    }
  }
}

function clearWeather() {
  GameState.weather.forEach(w => {
    if (w.mesh)  scene.remove(w.mesh);
    if (w.light) scene.remove(w.light);
  });
  GameState.weather = [];
}

function updateWeather(dt) {
  const p = GameState.player;
  GameState.weather.forEach(w => {
    if (w.type === 'snow' && w.mesh) {
      w.mesh.position.y += w.vy * dt * 8;
      w.mesh.position.x += (Math.sin(performance.now() * 0.001 + w.vy) * 0.5) * dt * 4;
      // Follow player loosely
      if (w.mesh.position.y < -1) w.mesh.position.y = 28;
      w.mesh.position.x = ((w.mesh.position.x - p.pos.x + 40) % 80) + p.pos.x - 40;
      w.mesh.position.z = ((w.mesh.position.z - p.pos.z + 40) % 80) + p.pos.z - 40;
    } else if (w.type === 'lava_light' && w.light) {
      w.light.intensity = 1.5 + Math.sin(performance.now() * 0.004 + w.light.position.x) * 0.8;
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  LAP TRACKING  — waypoint-based checkpoint system
// ═══════════════════════════════════════════════════════════
function updateLapTracking() {
  if (!trackSpline || GameState.mode !== 'racing') return;
  const p = GameState.player;
  if (p.finishedRace) return;

  // Find nearest waypoint index
  let nearest = 0, nearestDist = Infinity;
  trackWaypoints.forEach((wp, i) => {
    const dx = p.pos.x - wp.x, dz = p.pos.z - wp.z;
    const d = dx*dx + dz*dz;
    if (d < nearestDist) { nearestDist = d; nearest = i; }
  });

  const N = trackWaypoints.length;
  const expected = (p.lapWaypointIdx + 1) % N;

  if (nearest === expected) {
    p.lapWaypointIdx = nearest;

    // Crossed finish line (waypoint 0 after having traversed most waypoints)
    if (nearest === 0 && p.lapWaypointIdx >= 0) {
      const lapTime = (GameState.raceTimer - p.lapStartTime).toFixed(2);
      p.lapTimes.push(parseFloat(lapTime));
      p.lapStartTime = GameState.raceTimer;
      p.lapCount++;

      const totalLaps = GameState.currentTrack ? GameState.currentTrack.laps : 4;

      if (p.lapCount >= totalLaps) {
        p.finishedRace = true;
        setTimeout(finishRace, 600);
      } else {
        Audio.sfxLap();
        showToast(`🏁 LAP ${p.lapCount}/${totalLaps} — ${lapTime}s`, 2200);
      }
      updateLapHUD();
    }
  }
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  CAMERA MODES
// ═══════════════════════════════════════════════════════════
function updateCamera(dt) {
  const p = GameState.player;
  if (!p.mesh) return;

  const pos   = p.pos;
  const head  = p.heading;
  const speed = Math.abs(p.speed);
  const dir   = new THREE.Vector3(Math.sin(head), 0, Math.cos(head));

  const lerpF = Math.min(dt * 7, 1);

  switch(GameState.camMode) {
    case 0: { // Chase camera
      const behind = dir.clone().negate();
      const fovBoost = speed > 25 ? 1.0 + (speed - 25) / 40 : 1.0;
      const camTarget = pos.clone()
        .add(behind.clone().multiplyScalar(9 * fovBoost))
        .add(new THREE.Vector3(0, 4.5, 0));
      GameState.camSmooth.lerp(camTarget, lerpF);
      camera.position.copy(GameState.camSmooth);
      GameState.camLookAt.lerp(pos.clone().add(dir.clone().multiplyScalar(8)).add(new THREE.Vector3(0,1.2,0)), lerpF);
      camera.lookAt(GameState.camLookAt);
      break;
    }
    case 1: { // Hood cam
      const hood = pos.clone().add(dir.clone().multiplyScalar(1.5)).add(new THREE.Vector3(0, 1.1, 0));
      camera.position.copy(hood);
      camera.lookAt(pos.clone().add(dir.clone().multiplyScalar(20)).add(new THREE.Vector3(0, 0.8, 0)));
      break;
    }
    case 2: { // Cockpit cam
      const cockpit = pos.clone().add(dir.clone().multiplyScalar(0.2)).add(new THREE.Vector3(0, 0.85, 0));
      camera.position.copy(cockpit);
      camera.lookAt(pos.clone().add(dir.clone().multiplyScalar(15)).add(new THREE.Vector3(0, 0.5, 0)));
      break;
    }
    case 3: { // Top-down
      const above = pos.clone().add(new THREE.Vector3(0, 55, 0));
      GameState.camSmooth.lerp(above, lerpF * 0.5);
      camera.position.copy(GameState.camSmooth);
      camera.lookAt(pos);
      break;
    }
    case 4: { // Cinematic orbit
      GameState.cinemaAngle += dt * 0.35;
      const radius = 18 + Math.sin(GameState.cinemaAngle * 0.5) * 4;
      const height = 5 + Math.sin(GameState.cinemaAngle * 0.7) * 2.5;
      camera.position.set(
        pos.x + Math.cos(GameState.cinemaAngle) * radius,
        pos.y + height,
        pos.z + Math.sin(GameState.cinemaAngle) * radius
      );
      camera.lookAt(pos.clone().add(new THREE.Vector3(0, 1, 0)));
      break;
    }
  }

  // Dynamic FOV based on speed
  const targetFov = 58 + Math.min(speed / 3, 18);
  camera.fov += (targetFov - camera.fov) * lerpF * 0.4;
  camera.updateProjectionMatrix();
}

function cycleCameraMode() {
  GameState.camMode = (GameState.camMode + 1) % GameState.camModeNames.length;
  document.getElementById('hud-cam').textContent = `CAM: ${GameState.camModeNames[GameState.camMode]}`;
  showToast(`📷 ${GameState.camModeNames[GameState.camMode]} CAM`, 900);
}

// ═══════════════════════════════════════════════════════════
//  MINI-MAP
// ═══════════════════════════════════════════════════════════
const minimap = document.getElementById('minimap');
const mmCtx   = minimap.getContext('2d');

function drawMinimap() {
  mmCtx.clearRect(0, 0, 140, 140);
  if (!trackSpline) return;

  const cx = 70, cy = 70, scale = 0.48;

  // Track outline
  mmCtx.beginPath();
  mmCtx.strokeStyle = 'rgba(255,255,255,0.35)';
  mmCtx.lineWidth = 5;
  const pts = trackSpline.getPoints(60);
  pts.forEach((p, i) => {
    const sx = cx + p.x * scale;
    const sy = cy + p.z * scale;
    i === 0 ? mmCtx.moveTo(sx, sy) : mmCtx.lineTo(sx, sy);
  });
  mmCtx.closePath();
  mmCtx.stroke();

  // Opponents
  GameState.opponents.forEach((o, i) => {
    const colors = ['#4488ff','#ff8800','#44ff88','#ff44aa'];
    mmCtx.beginPath();
    mmCtx.fillStyle = colors[i] || '#888';
    mmCtx.arc(cx + o.pos.x * scale, cy + o.pos.z * scale, 3, 0, Math.PI*2);
    mmCtx.fill();
  });

  // Player (always white dot, larger)
  const p = GameState.player;
  mmCtx.beginPath();
  mmCtx.fillStyle = '#fff';
  mmCtx.arc(cx + p.pos.x * scale, cy + p.pos.z * scale, 5, 0, Math.PI*2);
  mmCtx.fill();

  // Direction indicator
  mmCtx.save();
  mmCtx.translate(cx + p.pos.x * scale, cy + p.pos.z * scale);
  mmCtx.rotate(p.heading);
  mmCtx.beginPath();
  mmCtx.fillStyle = '#ff6d00';
  mmCtx.moveTo(0, -8);
  mmCtx.lineTo(-3, 2);
  mmCtx.lineTo(3, 2);
  mmCtx.closePath();
  mmCtx.fill();
  mmCtx.restore();

  // Coins on map (small yellow dots)
  mmCtx.fillStyle = 'rgba(255,215,0,0.7)';
  GameState.coins.slice(0,20).forEach(c => {
    mmCtx.beginPath();
    mmCtx.arc(cx + c.pos.x * scale, cy + c.pos.z * scale, 2, 0, Math.PI*2);
    mmCtx.fill();
  });
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  HUD UPDATE HELPERS
// ═══════════════════════════════════════════════════════════
function updateSpeedHUD() {
  const kph = Math.abs(Math.round(GameState.player.speed * 3.6));
  document.getElementById('hud-speed').textContent = kph;
  const boostEl = document.getElementById('hud-boost');
  if (GameState.player.boosting > 0) {
    boostEl.style.display = 'block';
    boostEl.textContent = 'BOOST!';
    boostEl.style.color = '#ff6d00';
  } else if (nitroCooldown > 0) {
    boostEl.style.display = 'block';
    boostEl.textContent = `⚡ ${nitroCooldown.toFixed(1)}s`;
    boostEl.style.color = '#888';
    boostEl.style.animation = 'none';
  } else {
    boostEl.style.display = 'none';
    boostEl.style.animation = '';
  }
}

function updateHealthHUD() {
  const h = Math.max(0, GameState.player.health);
  const el = document.getElementById('hud-health');
  el.style.width = h + '%';
  el.style.background = h > 60 ? 'linear-gradient(90deg,#00e676,#69f0ae)'
    : h > 30 ? 'linear-gradient(90deg,#ffcc00,#ffee55)'
    : 'linear-gradient(90deg,#ff4444,#ff8844)';
}

function updateLapHUD() {
  const laps = GameState.currentTrack ? GameState.currentTrack.laps : 4;
  document.getElementById('hud-lap').textContent = `${Math.min(GameState.player.lapCount + 1, laps)}/${laps}`;
}

function updateTimerHUD() {
  const t = GameState.raceTimer;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60).toString().padStart(2, '0');
  document.getElementById('hud-time').textContent = `${m}:${s}`;
  // Warning color when time is running out (Time Trial)
  if (GameState.raceMode === 'trial') {
    const rem = GameState.timeLimitSeconds - t;
    document.getElementById('hud-time').style.color = rem < 20 ? '#ff4444' : '#FFD700';
  }
}

function updatePositionHUD() {
  const pos = getPlayerPosition();
  const suffixes = ['','st','nd','rd','th','th'];
  document.getElementById('hud-pos').textContent = pos + (suffixes[pos] || 'th');
}

function updatePowerupHUD() {
  const pu = GameState.heldPowerup;
  const el = document.getElementById('hud-powerup');
  if (pu) {
    el.style.display = 'block';
    document.getElementById('hud-powerup-icon').textContent = pu.icon;
    document.getElementById('hud-powerup-name').textContent = pu.name;
  } else {
    el.style.display = 'none';
  }
}

function updateHudXP() {
  document.getElementById('hud-level').textContent = `Lv.${Save.data.level}`;
  const needed = Save.xpForLevel(Save.data.level);
  const pct = Math.min((Save.data.xp / needed) * 100, 100);
  document.getElementById('hud-xp').style.width = pct + '%';
}

function updateEffectsHUD() {
  const p = GameState.player;
  const container = document.getElementById('hud-effects');
  container.innerHTML = '';
  const effects = [];
  if (p.shielded > 0)   effects.push({ icon:'🛡', label:`${p.shielded.toFixed(1)}s`, color:'#00aaff' });
  if (p.magnetized > 0) effects.push({ icon:'🧲', label:`${p.magnetized.toFixed(1)}s`, color:'#FFD700' });
  if (p.boosting > 0)   effects.push({ icon:'⚡', label:`${p.boosting.toFixed(1)}s`,   color:'#ff6d00' });
  if (p.frozen > 0)     effects.push({ icon:'❄',  label:`${p.frozen.toFixed(1)}s`,     color:'#44ccff' });
  if (p.invincible > 0) effects.push({ icon:'💫', label:`${p.invincible.toFixed(1)}s`, color:'#ffcc00' });
  effects.forEach(e => {
    const div = document.createElement('div');
    div.className = 'effect-badge';
    div.style.borderColor = e.color;
    div.innerHTML = `<span>${e.icon}</span><span style="color:${e.color}">${e.label}</span>`;
    container.appendChild(div);
  });
}

// Toast notification
let toastTimer = null;
function showToast(msg, duration = 1800) {
  const el = document.getElementById('game-toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.animation = 'toastIn 0.25s ease-out';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, duration);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  RACE FLOW — start, pause, finish, results
// ═══════════════════════════════════════════════════════════
function startRace(trackId, raceMode = 'quick') {
  const trackDef = TRACK_DEFS.find(t => t.id === trackId);
  const carId    = Save.data.selectedCar;
  const carDef   = CAR_DEFS.find(c => c.id === carId);
  if (!trackDef || !carDef) return;

  GameState.currentTrack = trackDef;
  GameState.currentCar   = carDef;
  GameState.raceMode     = raceMode;
  GameState.timeLimitSeconds = trackDef.timeLimit;
  Save.data.selectedTrack = trackId;
  Save.save();

  // Clear scene objects from prev race
  clearRaceObjects();

  // Build track
  buildTrack(trackDef);

  // Spawn player
  const startPt  = trackSpline.getPointAt(0);
  const startTan = trackSpline.getTangentAt(0);
  const startAngle = Math.atan2(startTan.x, startTan.z);

  if (GameState.player.mesh) scene.remove(GameState.player.mesh);
  const playerMesh = buildCarMesh(carDef, true);
  scene.add(playerMesh);

  const p = GameState.player;
  p.mesh        = playerMesh;
  p.pos.copy(startPt).addScaledVector(startTan, 2);
  p.pos.y       = 0;
  p.vel.set(0,0,0);
  p.speed       = 0;
  p.heading     = startAngle;
  p.health      = 100;
  p.invincible  = 0;
  p.frozen      = 0;
  p.boosting    = 0;
  p.shielded    = 0;
  p.magnetized  = 0;
  p.lapCount    = 0;
  p.lapWaypointIdx = 0;
  p.lapStartTime = 0;
  p.lapTimes    = [];
  p.totalTime   = 0;
  p.finishedRace = false;
  p.braking     = false;
  GameState.heldPowerup = null;
  nitroCooldown = 0;
  _barrierFlash = 0;

  playerMesh.position.copy(p.pos);
  playerMesh.rotation.y = p.heading;

  // Camera jump-start
  GameState.camSmooth.copy(p.pos.clone().add(new THREE.Vector3(0, 5, 10)));
  GameState.camLookAt.copy(p.pos);

  // Spawn AI
  spawnOpponents(trackDef, carDef);

  // Init world items
  obstacleSpawnTimer = 3;
  powerupSpawnTimer  = 5;
  coinSpawnTimer     = 1;

  // Init weather effects
  initWeather(trackDef.weather);

  // HUD
  updateHealthHUD();
  updateLapHUD();
  updatePowerupHUD();
  updateHudXP();
  document.getElementById('hud-coins').textContent = Save.data.coins;
  document.getElementById('hud').style.display = 'block';
  if (isMobile()) document.getElementById('mobile-controls').style.display = 'block';

  // Hide all screens
  document.querySelectorAll('[id^="screen-"]').forEach(s => s.style.display = 'none');

  // Countdown then race
  GameState.mode = 'countdown';
  GameState.raceTimer = 0;
  startCountdown();
}

function startCountdown() {
  const countEl = document.getElementById('countdown-num');
  const overlay = document.getElementById('screen-countdown');
  overlay.style.display = 'flex';

  let count = 3;
  countEl.textContent = count;
  Audio.sfxCountdown();

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      countEl.textContent = count;
      countEl.style.animation = 'none';
      void countEl.offsetWidth;
      countEl.style.animation = 'countPop 0.5s ease-out';
      Audio.sfxCountdown();
    } else {
      clearInterval(interval);
      countEl.textContent = 'GO!';
      countEl.style.color  = '#00ff88';
      Audio.sfxCountdownGo();
      Audio.startEngine();
      setTimeout(() => {
        overlay.style.display = 'none';
        GameState.mode = 'racing';
      }, 700);
    }
  }, 1000);
}

function pauseRace() {
  if (GameState.mode !== 'racing') return;
  GameState.mode = 'paused';
  Audio.stopEngine();
  document.getElementById('screen-pause').style.display = 'flex';
}

function resumeRace() {
  if (GameState.mode !== 'paused') return;
  document.getElementById('screen-pause').style.display = 'none';
  GameState.mode = 'racing';
  Audio.startEngine();
}

function abandonRace() {
  document.getElementById('screen-pause').style.display = 'none';
  endRaceSession();
  showScreen('screen-main');
}

function retryRace() {
  const tid = GameState.currentTrack ? GameState.currentTrack.id : 'city';
  const rm  = GameState.raceMode;
  document.getElementById('screen-results').style.display = 'none';
  startRace(tid, rm);
}

function endRaceSession() {
  GameState.mode = 'menu';
  Audio.stopEngine();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
  clearRaceObjects();
}

function clearRaceObjects() {
  GameState.obstacles.forEach(o => { if (o.mesh) scene.remove(o.mesh); });
  GameState.obstacles = [];
  GameState.coins.forEach(c => { if (c.mesh) scene.remove(c.mesh); });
  GameState.coins = [];
  GameState.powerups.forEach(p => {
    if (p.mesh) scene.remove(p.mesh);
    if (p.ring) scene.remove(p.ring);
  });
  GameState.powerups = [];
  GameState.particles.forEach(p => { if (p.mesh) scene.remove(p.mesh); });
  GameState.particles = [];
  clearWeather();
}

function startTimeTrialMode() {
  showScreen('screen-mode');
  GameState.raceMode = 'trial';
}

function finishRace() {
  if (GameState.mode === 'results') return;
  Audio.sfxFinish();
  Audio.stopEngine();
  GameState.mode = 'results';

  const p = GameState.player;
  const pos = getPlayerPosition();
  const isWin = pos === 1;
  const time = GameState.raceTimer;
  const m = Math.floor(time / 60);
  const s = (time % 60).toFixed(2);
  const timeStr = `${m}:${s.padStart(5,'0')}`;

  // Progression rewards
  const coinsEarned = Math.floor(30 + (5 - pos) * 15 + Math.random() * 20);
  const xpEarned    = Math.floor(80 + (5 - pos) * 40);
  Save.addCoins(coinsEarned);
  Save.addXP(xpEarned);
  Save.data.totalRaces++;
  if (isWin) Save.data.totalWins++;

  // Best time
  const tid = GameState.currentTrack.id;
  if (!Save.data.bestTimes[tid] || time < Save.data.bestTimes[tid]) {
    Save.data.bestTimes[tid] = parseFloat(time.toFixed(2));
  }
  Save.save();

  // Build results screen
  const posSuffixes = ['','1st','2nd','3rd','4th','5th'];
  document.getElementById('results-trophy').textContent = isWin ? '🏆' : pos <= 3 ? '🥈' : '🏁';
  document.getElementById('results-title').textContent  = isWin ? 'VICTORY!' : 'RACE COMPLETE';
  document.getElementById('results-title').style.color  = isWin ? '#FFD700' : '#00e5ff';
  document.getElementById('results-subtitle').textContent = `FINISHED IN ${posSuffixes[pos]} PLACE`;

  document.getElementById('results-grid').innerHTML = `
    <div style="text-align:center;"><div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:6px;">FINISH TIME</div><div style="font-size:28px;font-weight:900;color:#FFD700;">${timeStr}</div></div>
    <div style="text-align:center;"><div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:6px;">POSITION</div><div style="font-size:28px;font-weight:900;color:#00e5ff;">${posSuffixes[pos]}</div></div>
    <div style="text-align:center;"><div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:6px;">LAPS</div><div style="font-size:28px;font-weight:900;color:#fff;">${p.lapCount}/${GameState.currentTrack.laps}</div></div>
  `;

  document.getElementById('results-rewards').innerHTML = `
    <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap;">
      <div style="background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.3);border-radius:12px;padding:10px 20px;text-align:center;">
        <div style="font-size:22px;">🪙</div>
        <div style="font-size:20px;font-weight:900;color:#FFD700;">+${coinsEarned}</div>
        <div style="font-size:10px;color:#888;letter-spacing:1px;">COINS</div>
      </div>
      <div style="background:rgba(124,77,255,0.12);border:1px solid rgba(124,77,255,0.3);border-radius:12px;padding:10px 20px;text-align:center;">
        <div style="font-size:22px;">⭐</div>
        <div style="font-size:20px;font-weight:900;color:#b39ddb;">+${xpEarned}</div>
        <div style="font-size:10px;color:#888;letter-spacing:1px;">XP</div>
      </div>
    </div>
  `;

  document.getElementById('hud').style.display = 'none';
  document.getElementById('mobile-controls').style.display = 'none';
  document.getElementById('screen-results').style.display = 'flex';
}
</script>

<script>
// ═══════════════════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════════════════
function gameLoop() {
  requestAnimationFrame(gameLoop);

  deltaTime = Math.min(clock.getDelta(), 0.05); // cap at 50ms to avoid spiral

  if (GameState.mode === 'racing') {
    const carDef = GameState.currentCar;
    const laps   = GameState.currentTrack ? GameState.currentTrack.laps : 4;

    GameState.raceTimer += deltaTime;

    // Time Trial — check time limit
    if (GameState.raceMode === 'trial' && GameState.raceTimer >= GameState.timeLimitSeconds) {
      GameState.player.finishedRace = true;
      setTimeout(finishRace, 400);
    }

    updatePlayerPhysics(deltaTime, carDef);
    updateOpponents(deltaTime, laps);
    updateObstacles(deltaTime);
    updatePowerups(deltaTime);
    updateCoins(deltaTime);
    updateParticles(deltaTime);
    updateWeather(deltaTime);
    tickNitroCooldown(deltaTime);
    checkObstacleCollisions();
    updateLapTracking();

    // HUD throttle: update at ~20fps to save perf
    if (GameState.raceTimer - GameState.lastHudUpdate > 0.05) {
      GameState.lastHudUpdate = GameState.raceTimer;
      updateSpeedHUD();
      updateTimerHUD();
      updatePositionHUD();
      updateEffectsHUD();
    }

    drawMinimap();
  }

  if (GameState.mode === 'racing' || GameState.mode === 'paused' || GameState.mode === 'countdown') {
    updateCamera(deltaTime);
  }

  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════
//  UI SCREENS — init and populate
// ═══════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('[id^="screen-"]').forEach(s => s.style.display = 'none');
  const el = document.getElementById(id);
  if (el) el.style.display = 'flex';

  if (id === 'screen-mode')   buildTrackGrid();
  if (id === 'screen-garage') buildCarGrid();
  if (id === 'screen-stats')  buildStatsScreen();
  if (id === 'screen-main')   updateMainMenu();
}

function updateMainMenu() {
  document.getElementById('save-badge').textContent =
    `Lv.${Save.data.level}  ·  🪙 ${Save.data.coins}  ·  ${Save.data.totalRaces} Races`;
}

function buildTrackGrid() {
  const grid = document.getElementById('track-grid');
  grid.innerHTML = '';
  TRACK_DEFS.forEach(t => {
    const unlocked = Save.data.unlockedTracks.includes(t.id);
    const best     = Save.data.bestTimes[t.id];
    const bestStr  = best
      ? `⏱ ${Math.floor(best/60)}:${(best % 60).toFixed(2).padStart(5,'0')}`
      : 'No best time yet';

    const div = document.createElement('div');
    div.className = 'track-card' + (unlocked ? '' : ' locked');

    div.innerHTML = `
      <div style="font-size:32px;margin-bottom:8px;">${t.emoji}</div>
      <div style="font-weight:800;font-size:14px;color:${unlocked ? '#fff' : '#888'};margin-bottom:4px;">${t.name}</div>
      <div style="font-size:11px;color:#666;margin-bottom:6px;">${t.desc}</div>
      <div style="font-size:11px;color:#aaa;">${t.laps} laps · ${t.timeLimit}s</div>
      <div style="font-size:12px;margin-top:6px;font-weight:700;color:${unlocked ? '#00e5ff' : '#ff8888'};">
        ${unlocked ? bestStr : '🔒 Reach Level ' + t.unlockLevel}
      </div>
      ${unlocked ? '<div style="font-size:10px;color:#00e676;margin-top:5px;letter-spacing:1px;">TAP TO RACE ▶</div>' : ''}
    `;

    div.style.cursor = unlocked ? 'pointer' : 'not-allowed';

    if (unlocked) {
      div.onclick = () => startRace(t.id, GameState.raceMode || 'quick');
    } else {
      div.onclick = () => showToast(`🔒 Reach Level ${t.unlockLevel} to unlock ${t.name}`, 2000);
    }

    grid.appendChild(div);
  });
}

function buildCarGrid() {
  const grid = document.getElementById('car-grid');
  grid.innerHTML = '';
  CAR_DEFS.forEach(c => {
    const unlocked = Save.data.unlockedCars.includes(c.id);
    const selected = Save.data.selectedCar === c.id;
    const div = document.createElement('div');
    div.className = 'car-card' + (selected ? ' selected' : '') + (unlocked ? '' : ' locked');
    div.innerHTML = `
      <div style="font-size:28px;margin-bottom:6px;">${c.emoji}</div>
      <div style="font-weight:800;font-size:13px;color:#fff;">${c.name}</div>
      <div style="font-size:10px;color:#888;margin:4px 0;">${c.desc}</div>
      <div style="font-size:10px;color:#aaa;margin-top:6px;">
        <div>⚡ ${c.accel} &nbsp; 🏎 ${c.maxSpeed}</div>
        <div style="margin-top:2px;">🎯 ${Math.round(c.handling*10)}/10</div>
      </div>
      ${unlocked ? (selected ? '<div style="font-size:10px;color:#00e5ff;margin-top:5px;font-weight:800;">✓ SELECTED</div>' : '<div style="font-size:10px;color:#aaa;margin-top:5px;">Click to select</div>') : `<div style="font-size:10px;color:#ff8888;margin-top:5px;">🔒 Level ${c.unlockLevel}</div>`}
    `;
    if (unlocked) {
      div.onclick = () => {
        Save.data.selectedCar = c.id;
        Save.save();
        buildCarGrid();
      };
    }
    grid.appendChild(div);
  });
}

function buildStatsScreen() {
  const s = Save.data;
  document.getElementById('stats-content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px 32px;text-align:left;">
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">DRIVER LEVEL</div><div style="font-size:28px;font-weight:900;color:#b39ddb;">Level ${s.level}</div></div>
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">TOTAL COINS</div><div style="font-size:28px;font-weight:900;color:#FFD700;">🪙 ${s.coins}</div></div>
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">TOTAL RACES</div><div style="font-size:28px;font-weight:900;color:#00e5ff;">${s.totalRaces}</div></div>
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">TOTAL WINS</div><div style="font-size:28px;font-weight:900;color:#00e676;">${s.totalWins}</div></div>
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">WIN RATE</div><div style="font-size:28px;font-weight:900;color:#fff;">${s.totalRaces > 0 ? Math.round(s.totalWins/s.totalRaces*100) : 0}%</div></div>
      <div><div style="font-size:11px;color:#888;letter-spacing:1px;">CARS UNLOCKED</div><div style="font-size:28px;font-weight:900;color:#ff8888;">${s.unlockedCars.length}/${CAR_DEFS.length}</div></div>
    </div>
    <div style="margin-top:20px;border-top:1px solid rgba(255,255,255,0.08);padding-top:16px;">
      <div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:10px;">BEST LAP TIMES</div>
      ${TRACK_DEFS.filter(t => s.bestTimes[t.id]).map(t => {
        const bt = s.bestTimes[t.id];
        return `<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <span style="color:#ccc;">${t.emoji} ${t.name}</span>
          <span style="color:#FFD700;font-weight:800;">⏱ ${Math.floor(bt/60)}:${(bt%60).toFixed(2).padStart(5,'0')}</span>
        </div>`;
      }).join('') || '<div style="color:#555;font-size:13px;text-align:center;padding:10px;">No races completed yet.</div>'}
    </div>
    <button onclick="if(confirm('Reset all save data?')){localStorage.removeItem(\'ddl_save\');location.reload();}" style="margin-top:18px;background:rgba(244,67,54,0.2);border:1px solid rgba(244,67,54,0.4);color:#ff8888;border-radius:8px;padding:8px 20px;cursor:pointer;font-size:12px;letter-spacing:1px;">🗑 RESET SAVE</button>
  `;
}

// ═══════════════════════════════════════════════════════════
//  BOOT — Init scene and start
// ═══════════════════════════════════════════════════════════
function boot() {
  // ── One-time save migration: wipe malformed saves that have empty unlock arrays
  try {
    const raw = localStorage.getItem('ddl_save');
    if (raw) {
      const s = JSON.parse(raw);
      const badUnlocks = !s.unlockedTracks || !Array.isArray(s.unlockedTracks) || s.unlockedTracks.length === 0;
      if (badUnlocks) {
        localStorage.removeItem('ddl_save');
        Save.data = {
          coins: s.coins || 0, xp: s.xp || 0, level: s.level || 1,
          selectedCar: 'speeder', selectedTrack: 'city',
          unlockedCars: ['speeder'], unlockedTracks: ['city','desert','mountain','snow'],
          bestTimes: s.bestTimes || {}, totalRaces: s.totalRaces || 0, totalWins: s.totalWins || 0,
        };
        Save.save();
      }
    }
  } catch(_) {}
  Save.load(); // re-load after migration to get the clean state
  // Background idle scene — spins camera around empty track for menu
  renderer.setClearColor(0x0a0a0f);
  buildTrack(TRACK_DEFS[0]); // Load city in background
  GameState.mode = 'menu';
  showScreen('screen-main');
  updateMainMenu();
  updateHudXP();

  // Idle camera orbits the track
  let idleAngle = 0;
  const idleLoop = setInterval(() => {
    if (GameState.mode !== 'menu') { clearInterval(idleLoop); return; }
    idleAngle += 0.005;
    camera.position.set(Math.cos(idleAngle) * 130, 45, Math.sin(idleAngle) * 80);
    camera.lookAt(0, 0, 0);
    renderer.render(scene, camera);
  }, 16);

  gameLoop();
}

boot();
</script>

</body>
</html>
